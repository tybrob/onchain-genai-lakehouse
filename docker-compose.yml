  btc-listener:
    image: btc-listener:latest
    container_name: btc-listener
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  jobmanager:
    image: flink-enrichment:latest
    depends_on:
      - btc-listener
    ports:
      - "8081:8081"
    command: standalone-job --job-classname com.onchain.flink.EnrichmentJob --jars /opt/flink/usrlib/flink-btc-enrichment.jar
    environment:
      - |
        FLINK_PROPERTIES=jobmanager.rpc.address: jobmanager        

  taskmanager:
    image: flink-enrichment:latest
    depends_on:
      - jobmanager
    command: taskmanager
    scale: 1
    environment:
      - |
        FLINK_PROPERTIES=jobmanager.rpc.address: jobmanager